name: Validate schemas and generated files

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Validate core.json against schema
        run: node scripts/validate.js -s spec/schema/core.schema.json spec/core.json

      - name: Validate standalone provenance examples against schema
        run: |
          # Only validate standalone HALOS provenance records.
          # cyclonedx-embedded.json and slsa-embedded.json are envelope documents
          # (CycloneDX SBOM, in-toto Statement) — not standalone provenance records.
          node scripts/validate.js \
            -s spec/schema/halos-provenance-v0.1.schema.json \
            examples/minimal.json

      - name: Validate manifest.json against schema
        run: node scripts/validate.js -s spec/schema/manifest.schema.json spec/manifest.json

      - name: Validate changelog.json against schema
        run: node scripts/validate.js -s spec/schema/changelog.schema.json spec/changelog.json

      - name: Check generated principles are up to date
        run: |
          node scripts/generate-principles.js
          if ! git diff --exit-code PRINCIPLES/halos-principles-v1.0.md; then
            echo "::error::PRINCIPLES/halos-principles-v1.0.md is out of date with spec/core.json. Run: node scripts/generate-principles.js"
            exit 1
          fi
